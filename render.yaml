services:
  - type: web
    name: attendance-system
    runtime: node
    buildCommand: npm install && npm run build && node server/dist/db/migrate.js && node server/dist/db/seed.js
    startCommand: node server/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: attendance-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false

databases:
  - name: attendance-db
    databaseName: attendance
    user: attendance
    plan: free
